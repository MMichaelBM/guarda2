<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<canvas id="particles"></canvas>

<header class="header">
    <img class="logo-banner" src="imagem/cbmce.png">
    <img class="avatar" src="imagem/logo1.png">
</header>

<main class="main">
    
    <div class="card">
        <h2>Links úteis</h2>

        <a href="https://cod.cb.ce.gov.br/" target="_blank">C.O.D</a>

        <a href="https://www.google.com" target="_blank">Acessar internet</a>
    </div>

    <div class="card">
        <h2 class="soco">SOCORRO</h2>

        <a class="link-socorro" href="#">Viatura</a>
        <a class="link-socorro" href="#">Material</a>

        <h2 class="salv">SALVAMENTO</h2>

        <a class="link-salvamento" href="#">Viatura</a>
        <a class="link-salvamento" href="#">Material</a>
    </div>

</main>

<div id="data"></div>

<footer>
    © 3ªCIA / 3ºBBM – Itapipoca • <b>Michael Robson</b> 🇧🇷
</footer>

<script>
// ================= DATA =================
function atualizarDataHora() {
    const agora = new Date();
    document.getElementById("data").textContent =
        agora.toLocaleDateString("pt-BR", {
            weekday: 'long',
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
}
setInterval(atualizarDataHora, 1000);
atualizarDataHora();


// ================= PARTICULAS AVANÇADAS =================
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let width, height;
let particles = [];

const mouse = {
    x: null,
    y: null,
    radius: 140
};

function resizeCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    initParticles();
}

window.addEventListener("resize", resizeCanvas);

window.addEventListener("mousemove", (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener("mouseleave", () => {
    mouse.x = null;
    mouse.y = null;
});

function lerp(a, b, t) {
    return a + (b - a) * t;
}

// 🔥 NOVA PALETA: vermelho → laranja → caqui
function colorByX(x) {
    const t = Math.max(0, Math.min(1, x / width));

    let r, g, b;

    if (t < 0.5) {
        const tt = t * 2;
        r = Math.round(lerp(180, 255, tt)); // vermelho → laranja
        g = Math.round(lerp(30, 120, tt));
        b = Math.round(lerp(30, 40, tt));
    } else {
        const tt = (t - 0.5) * 2;
        r = Math.round(lerp(255, 195, tt)); // laranja → caqui
        g = Math.round(lerp(120, 176, tt));
        b = Math.round(lerp(40, 145, tt));
    }

    return `rgb(${r}, ${g}, ${b})`;
}

class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.size = 1.5;
    }

    update() {
        if (mouse.x !== null) {
            let dx = this.x - mouse.x;
            let dy = this.y - mouse.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < mouse.radius) {
                let force = (mouse.radius - dist) / mouse.radius;
                this.vx += (dx / dist) * force * 2;
                this.vy += (dy / dist) * force * 2;
            }
        }

        // voltar pro lugar
        this.vx += (this.baseX - this.x) * 0.04;
        this.vy += (this.baseY - this.y) * 0.04;

        this.vx *= 0.9;
        this.vy *= 0.9;

        this.x += this.vx;
        this.y += this.vy;
    }

    draw() {
        ctx.beginPath();
        ctx.fillStyle = colorByX(this.x);
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    const spacing = 30;

    for (let y = 0; y < height; y += spacing) {
        for (let x = 0; x < width; x += spacing) {
            particles.push(new Particle(x, y));
        }
    }
}

function connectParticles() {
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {

            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 80) {
                let opacity = 1 - dist / 80;

                ctx.strokeStyle = colorByX((particles[i].x + particles[j].x)/2)
                    .replace("rgb", "rgba")
                    .replace(")", `, ${opacity * 0.2})`);

                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
}

// 🔥 brilho no mouse (cor quente)
function drawGlow() {
    if (mouse.x === null) return;

    let grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 180);
    grad.addColorStop(0, "rgba(255,80,0,0.15)");
    grad.addColorStop(0.5, "rgba(255,140,0,0.08)");
    grad.addColorStop(1, "transparent");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 180, 0, Math.PI * 2);
    ctx.fill();
}

function animate() {
    ctx.clearRect(0, 0, width, height);

    drawGlow();

    particles.forEach(p => p.update());
    connectParticles();
    particles.forEach(p => p.draw());

    requestAnimationFrame(animate);
}

resizeCanvas();
animate();

</script>

</body>
</html>
