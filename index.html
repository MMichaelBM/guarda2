<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUARDA – Atalhos Úteis</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <header class="header parallax" data-speed="12">
        <img class="logo-banner" src="imagem/cbmce.png" alt="Logo CBMCE">
        <img class="avatar" src="imagem/logo1.png" alt="Avatar">
    </header>

    <main class="main">
        <div class="card parallax" data-speed="18">
            <h2>Links úteis</h2>

            <a href="https://cod.cb.ce.gov.br/" target="_blank">C.O.D</a>
            <a href="https://sentinela2.cb.ce.gov.br/v1.6/sentinela_Login/sentinela_Login.php" target="_blank">Sentinela</a>
            <a href="https://meu.cb.ce.gov.br/" target="_blank">Meu CBMCE</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScsDF7IlzqkWFdwZs2Hz_crdVByoritpOgndSA8vnwjwDLaNA/viewform?pli=1" target="_blank">Estatísticas</a>
            <a href="https://www.google.com" target="_blank">Acessar internet</a>
        </div>

        <div class="card parallax" data-speed="24">
            <h2 class="soco">SOCORRO</h2>

            <a class="link-socorro" href="https://docs.google.com/forms/d/1OsdKHj9aTW1CTzMMVV3byIGW_W7JMFutToKRs-H7MjQ/edit" target="_blank">Viatura</a>
            <a class="link-socorro" href="https://docs.google.com/forms/d/11DPZ-cGAEbmbvKnqyeEFym_UWUcKaihMLJ02W35JwvA/viewform?edit_requested=true" target="_blank">Material</a>

            <h2 class="salv">SALVAMENTO</h2>

            <a class="link-salvamento" href="https://docs.google.com/forms/d/e/1FAIpQLSe5yydc5sr4i3yg4NgQChelQrcdx3lY66onlrBM_xTmp0Hzqg/viewform" target="_blank">Viatura</a>
            <a class="link-salvamento" href="https://docs.google.com/forms/d/e/1FAIpQLScoMnfKY7CBI3gviHIgog8DlTf9ieSAUug-mgYgqB4sYLYV6A/viewform" target="_blank">Material</a>
        </div>
    </main>

    <div id="data" class="parallax" data-speed="10"></div>

    <footer class="parallax" data-speed="8">
        © 3ªCIA / 3ºBBM – Itapipoca • <b>Michael Robson</b> 🇧🇷
    </footer>

    <script>
        function atualizarDataHora() {
            const agora = new Date();
            const opcoes = {
                weekday: 'long',
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };

            document.getElementById("data").textContent =
                agora.toLocaleDateString("pt-BR", opcoes);
        }

        setInterval(atualizarDataHora, 1000);
        atualizarDataHora();

        const items = document.querySelectorAll(".parallax");
        const orbs = document.querySelectorAll(".bg-orb");

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        document.addEventListener("mousemove", (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            targetX = (x - 0.5) * 2;
            targetY = (y - 0.5) * 2;
        });

        function animate() {
            currentX += (targetX - currentX) * 0.06;
            currentY += (targetY - currentY) * 0.06;

            items.forEach((item) => {
                const speed = Number(item.dataset.speed || 10);
                const moveX = currentX * speed;
                const moveY = currentY * speed;

                item.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });

            orbs.forEach((orb, index) => {
                const factor = index === 0 ? 30 : 18;
                orb.style.transform = `translate(${currentX * factor}px, ${currentY * factor}px)`;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
